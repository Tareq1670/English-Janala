<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Fav Icon -->
        <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
        <!-- Font Awesome CDN  -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <!-- Tailwind and Daisy CDN -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style/style.css" />
        <title>English Janala || Best Platform for learning English</title>
    </head>
    <body>
        <header class="mx-auto bg-info/10 shadow-sm py-4 p-0 lg:px-[87px]">
            <div class="navbar flex justify-between">
                <div class="navber_start">
                    <a
                        href="#"
                        class="flex items-center text-lg font-semibold py-[6px] gap-1"
                    >
                        <span>English</span>
                        <img src="assets/logo.png" alt="" />
                        <span class="font_bangla font-normal">জানালা</span>
                    </a>
                </div>
                <div class="navber_end flex gap-4 hidden sm:flex">
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-circle-question"></i>FAQ
                    </button>
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-book-open"></i>Learn
                    </button>
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i
                        >logout
                    </button>
                </div>
                <div class="menu_icon dropdown sm:hidden">
                    <div tabindex="0" role="button" class="">
                        <i
                            class="fa-solid fa-bars-staggered cursor-pointer text-[20px]"
                        ></i>
                    </div>
                    <ul
                        tabindex="0"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 p-2 shadow felx w-[150px] gap-2 right-0 text-[20px]"
                    >
                        <li>
                            <button class="">
                                <i class="fa-solid fa-circle-question"></i>FAQ
                            </button>
                        </li>
                        <li>
                            <button class="">
                                <i class="fa-solid fa-book-open"></i>Learn
                            </button>
                        </li>
                        <li>
                            <button class="">
                                <i
                                    class="fa-solid fa-arrow-right-from-bracket"
                                ></i
                                >logout
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
    </body>
</html>
