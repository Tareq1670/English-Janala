<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Fav Icon -->
        <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
        <!-- Font Awesome CDN  -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <!-- Tailwind and Daisy CDN -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style/style.css" />
        <title>English Janala || Best Platform for learning English</title>
    </head>
    <body>
        <!-- *Header -->
        <header class="mx-auto bg-info/10 shadow-sm sm:py-4 p-0 lg:px-[87px]">
            <div class="navbar flex justify-between">
                <div class="navber_start">
                    <a
                        href="#"
                        class="flex items-center text-lg font-semibold py-[6px] gap-1"
                    >
                        <span>English</span>
                        <img src="assets/logo.png" alt="" />
                        <span class="font_bangla font-normal">জানালা</span>
                    </a>
                </div>
                <div class="navber_end flex gap-4 hidden sm:flex">
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-circle-question"></i>FAQ
                    </button>
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-book-open"></i>Learn
                    </button>
                    <button class="btn btn-primary btn-outline">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i
                        >logout
                    </button>
                </div>
                <div class="menu_icon dropdown sm:hidden">
                    <div tabindex="0" role="button" class="">
                        <i
                            class="fa-solid fa-bars-staggered cursor-pointer text-[20px]"
                        ></i>
                    </div>
                    <ul
                        tabindex="0"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-6 p-2 shadow felx w-[150px] gap-2 right-0 text-[20px]"
                    >
                        <li>
                            <button class="">
                                <i class="fa-solid fa-circle-question"></i>FAQ
                            </button>
                        </li>
                        <li>
                            <button class="">
                                <i class="fa-solid fa-book-open"></i>Learn
                            </button>
                        </li>
                        <li>
                            <button class="">
                                <i
                                    class="fa-solid fa-arrow-right-from-bracket"
                                ></i
                                >logout
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <!-- *Banner -->
        <section class="px-1 sm:px-0 py-5 flex flex-col-reverse md:flex-row justify-between items-center container mx-auto gap-5">
            <div class="content flex-1 text-center md:text-left">
                <h2 class="text-[28px] mb-8 sm:text-[40px] lg:text-[48px] font-bold"><span class="text-info">English</span> is Easy!!</h2>
                <p class="font_bangla max-w-[727px] text-[18px] lg:text-[24px] font-medium mb-5">
                    আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন
                    অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons
                    আপনাকে নিয়ে যাবে অন্য একটি Level এ
                </p>
                <form action="" class="flex flex-col w-full sm:max-w-80 py-3 space-y-5 ">
                    <input class="text-[14px] py-2 px-3 border-black/30 rounded-md outline-none" type="text" placeholder="Enter Your Name">
                    <input class="text-[14px] py-2 px-3 border-black/30 rounded-md outline-none" type="password" placeholder="Enter Your Password">
                    <input class="btn btn-primary w-[120px] text-[18px]" type="submit" value="Get Start">
                </form>
            </div>
            <div class="img flex-1">
                <img src="assets/hero-student.png" alt="">
            </div>
        </section>
    </body>
</html>
